name: Deploy v5 Preview

# Builds the v5 branch and publishes via mike under the `next` alias.
# Never touches `latest` — that alias only moves on the manual deploy.yml run.

on:
    push:
        branches: [v5]

concurrency:
    group: pages
    cancel-in-progress: true

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4.3.0
              with:
                  fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@v6.7.0
              with:
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: Set up Python
              uses: actions/setup-python@v6.0.0
              with:
                  python-version-file: .python-version

            - name: Install dependencies
              run: uv sync --all-extras --dev

            - name: Refresh generated snippets
              run: |
                  uv run python docs/scripts/gen_env_vars.py
                  uv run python docs/scripts/gen_platforms.py
                  uv run python docs/scripts/gen_scheduled_tasks.py

            - name: Set Git user
              run: |
                  git config --global user.name ${{ secrets.GIT_NAME }}
                  git config --global user.email ${{ secrets.GIT_EMAIL }}
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
                  git fetch -a
                  git checkout gh-pages
                  git pull origin gh-pages
                  git checkout v5

            - name: Deploy `next` alias via mike
              run: uv run mike deploy --push --update-aliases 5.0-dev next
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
